name: Release

on:
  push:
    tags: ['v[0-9]*']

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag $TAG must match vMAJOR.MINOR.PATCH"
            exit 1
          fi
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag $TAG does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Require passing CI for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${GITHUB_SHA}"
          for attempt in $(seq 1 60); do
            run=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${SHA}&event=push&branch=main&per_page=1" \
              --jq '.workflow_runs[0] // {} | [.status // "none", .conclusion // "none"] | @tsv' \
              2>/dev/null || echo "")
            status=$(printf '%s' "$run" | cut -f1)
            conclusion=$(printf '%s' "$run" | cut -f2)
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "CI passed for ${SHA}."
                break
              fi
              echo "::error::CI concluded '${conclusion}' for ${SHA}"
              exit 1
            fi
            if [ "$attempt" = 60 ]; then
              echo "::error::Timed out waiting for successful CI on ${SHA}"
              exit 1
            fi
            sleep 10
          done

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.8.0

      - name: Install locked dependencies
        run: npm ci

      - name: Run release checks
        run: npm run release:check

      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 == "## [" ver "]" || index($0, "## [" ver "] -")) found=1; next }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if ! [ -s /tmp/release-notes.md ] || ! grep -q '[^[:space:]]' /tmp/release-notes.md; then
            echo "::error::No release notes found for version $VERSION"
            exit 1
          fi

      - name: Detect first npm publication
        id: npm_package
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if output=$(npm view "$PACKAGE_NAME" name --json 2>&1); then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$output" | grep -q 'E404'; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$output"
            echo "::error::Could not determine whether $PACKAGE_NAME exists on npm"
            exit 1
          fi

      - name: Publish to npm with trusted OIDC
        if: steps.npm_package.outputs.exists == 'true'
        run: npm publish --ignore-scripts --provenance --access public

      - name: Bootstrap the first npm publication
        if: steps.npm_package.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::The first publication requires a short-lived, read/write @sublang NPM_BOOTSTRAP_TOKEN with bypass 2FA"
            exit 1
          fi
          npm publish --ignore-scripts --provenance --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md
